<div class="pool-tile" data-view="compact">
  <script src="/icons.js"></script>
  <style>
    .pool-tile {
      --pool-bg: #eaf7f5;
      --pool-panel: #ffffff;
      --pool-text: #102431;
      --pool-muted: #667884;
      --pool-border: #c8dfdc;
      --pool-good: #24cf79;
      --pool-warning: #e4b72f;
      --pool-critical: #e94d5c;
      --pool-neutral: #1976d2;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-height: 0;
      padding: 14px;
      color: var(--pool-text);
      background: linear-gradient(180deg, #e7f7f4 0%, #eef9f6 100%);
      font-family: inherit;
      overflow: hidden;
    }

    .pool-tile * {
      box-sizing: border-box;
    }

    .pool-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }

    .pool-title {
      color: var(--pool-muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
      text-transform: uppercase;
    }

    .pool-temperature {
      margin-top: 3px;
      font-size: 30px;
      line-height: 1;
      font-weight: 800;
      white-space: nowrap;
    }

    .pool-badge {
      min-width: 58px;
      padding: 7px 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      background: var(--pool-neutral);
      color: #fff;
      box-shadow: 0 6px 16px rgba(16, 36, 49, 0.12);
    }

    .pool-badge.good { background: var(--pool-good); color: #07180f; }
    .pool-badge.warning { background: var(--pool-warning); color: #241b02; }
    .pool-badge.critical { background: var(--pool-critical); }

    .pool-primary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .pool-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
      gap: 7px;
    }

    .pool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(142px, 1fr));
      gap: 8px;
    }

    .pool-metric {
      min-height: 60px;
      padding: 10px;
      border: 1px solid var(--pool-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 1px 2px rgba(16, 36, 49, 0.08);
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .pool-primary .pool-metric {
      min-height: 68px;
      border-color: rgba(25, 118, 210, 0.18);
    }

    .pool-strip .pool-metric {
      min-height: 50px;
      padding: 8px;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
    }

    .pool-strip .pool-metric i {
      display: none;
    }

    .pool-metric i {
      color: var(--pool-neutral);
      font-size: 16px;
      text-align: center;
    }

    .pool-metric.good i { color: var(--pool-good); }
    .pool-metric.warning i { color: var(--pool-warning); }
    .pool-metric.critical i { color: var(--pool-critical); }

    .pool-label {
      color: var(--pool-muted);
      font-size: 11px;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pool-value {
      margin-top: 3px;
      color: var(--pool-text);
      font-size: 16px;
      line-height: 1.05;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pool-strip .pool-value {
      font-size: 14px;
    }

    .pool-section {
      margin-top: 14px;
    }

    .pool-tile[data-view="compact"] .pool-section {
      display: none !important;
    }

    .pool-tile[data-view="detail"] {
      min-height: 520px;
      padding: 20px;
      overflow: auto;
    }

    .pool-tile[data-view="detail"] .pool-strip {
      margin-bottom: 2px;
    }

    .pool-section-title {
      margin: 0 0 7px;
      color: var(--pool-muted);
      font-size: 12px;
      line-height: 1;
      font-weight: 800;
      text-transform: uppercase;
    }

    .pool-action {
      width: 100%;
      margin-top: 7px;
      border: 1px solid var(--pool-border);
      border-radius: 8px;
      padding: 7px;
      color: var(--pool-text);
      background: #f3f8f8;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    .pool-color {
      width: 100%;
      height: 28px;
      margin-top: 7px;
      border: 1px solid var(--pool-border);
      border-radius: 8px;
      background: transparent;
    }
  </style>

  <div class="pool-hero">
    <div>
      <div class="pool-title" data-bind="title">Pool</div>
      <div class="pool-temperature" data-bind="temperature"></div>
    </div>
    <div class="pool-badge" data-bind="badge">Status</div>
  </div>

  <div class="pool-primary" data-bind="compactPrimary"></div>
  <div class="pool-strip" data-bind="compactStrip"></div>

  <div class="pool-section" data-bind-section="detail">
    <div class="pool-section-title">Details</div>
    <div class="pool-grid" data-bind="detail"></div>
  </div>
  <div class="pool-section" data-bind-section="lights">
    <div class="pool-section-title">Licht</div>
    <div class="pool-grid" data-bind="lights"></div>
  </div>
  <div class="pool-section" data-bind-section="robot">
    <div class="pool-section-title">Poolroboter</div>
    <div class="pool-grid" data-bind="robot"></div>
  </div>
</div>

<script>
  (() => {
    let payload = %%INITIAL_DATA%%;
    const root = document.currentScript.previousElementSibling;

    const iconClass = {
      fan: 'fa-light fa-fan',
      gauge: 'fa-light fa-gauge',
      bolt: 'fa-light fa-bolt',
      flask: 'fa-light fa-flask',
      droplet: 'fa-light fa-droplet',
      temperature: 'fa-light fa-temperature-half',
      clock: 'fa-light fa-clock',
      sun: 'fa-light fa-sun',
      microchip: 'fa-light fa-microchip',
      water: 'fa-light fa-water',
      lightbulb: 'fa-light fa-lightbulb',
      palette: 'fa-light fa-palette',
      robot: 'fa-light fa-robot',
      hourglass: 'fa-light fa-hourglass-half'
    };

    const primaryLabels = new Set(['Filtersteuerung', 'Filterdruck', 'Redox', 'pH']);

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    function metricHtml(metric) {
      const icon = iconClass[metric.icon] || 'fa-light fa-circle-info';
      const isDetailView = root.dataset.view === 'detail';
      const action = payload.allowActions && isDetailView && metric.actionable ? actionHtml(metric) : '';

      return `
        <div class="pool-metric ${escapeHtml(metric.state)}">
          <i class="${icon}"></i>
          <div>
            <div class="pool-label">${escapeHtml(metric.label)}</div>
            <div class="pool-value">${escapeHtml(metric.formatted)}</div>
            ${action}
          </div>
        </div>
      `;
    }

    function actionHtml(metric) {
      if (metric.kind === 'color') {
        return `<input class="pool-color" type="color" data-action="${metric.id}" value="#000000" title="${escapeHtml(metric.label)}">`;
      }

      return `<button class="pool-action" type="button" data-action="${metric.id}" data-value="${metric.value ? 0 : 1}">Umschalten</button>`;
    }

    function renderMetricList(bindName, items) {
      const target = root.querySelector(`[data-bind="${bindName}"]`);
      if (!target) return;
      target.innerHTML = (items || []).map(metricHtml).join('');
    }

    function renderGroup(name, items) {
      const section = root.querySelector(`[data-bind-section="${name}"]`);
      const target = root.querySelector(`[data-bind="${name}"]`);
      if (!target) return;

      if (!payload.inlineSections?.[name] || !items || items.length === 0) {
        if (section) section.style.display = 'none';
        target.innerHTML = '';
        return;
      }

      if (section) section.style.display = '';
      target.innerHTML = items.map(metricHtml).join('');
    }

    function renderCompact(items) {
      const primary = [];
      const strip = [];

      (items || []).forEach((metric) => {
        if (primaryLabels.has(metric.label) && primary.length < 4) {
          primary.push(metric);
        } else {
          strip.push(metric);
        }
      });

      renderMetricList('compactPrimary', primary);
      renderMetricList('compactStrip', strip);
    }

    function render(nextPayload) {
      payload = typeof nextPayload === 'string' ? JSON.parse(nextPayload) : nextPayload;
      root.querySelector('[data-bind="title"]').textContent = payload.title || 'Pool';
      root.querySelector('[data-bind="temperature"]').textContent = payload.summary?.temperature || '';

      const badge = root.querySelector('[data-bind="badge"]');
      badge.textContent = payload.summary?.headline || 'Status';
      badge.className = `pool-badge ${payload.summary?.state || 'neutral'}`;

      renderCompact(payload.compact);
      renderGroup('detail', payload.detail);
      renderGroup('lights', payload.lights);
      renderGroup('robot', payload.robot);
    }

    function updateViewMode() {
      const width = root.clientWidth || 0;
      const height = root.clientHeight || 0;
      const detailView = width >= 900 && height >= 650;
      const nextView = detailView ? 'detail' : 'compact';

      if (root.dataset.view !== nextView) {
        root.dataset.view = nextView;
        render(payload);
      }
    }

    root.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button || !window.requestAction) return;
      window.requestAction(`var:${button.dataset.action}`, Number(button.dataset.value));
    });

    root.addEventListener('change', (event) => {
      const input = event.target.closest('input[type="color"][data-action]');
      if (!input || !window.requestAction) return;
      window.requestAction(`var:${input.dataset.action}`, parseInt(input.value.slice(1), 16));
    });

    window.handleMessage = render;
    render(payload);
    updateViewMode();

    if ('ResizeObserver' in window) {
      new ResizeObserver(updateViewMode).observe(root);
    } else {
      window.addEventListener('resize', updateViewMode);
    }
  })();
</script>
